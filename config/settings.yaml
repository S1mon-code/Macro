bls:
  api_key: "f52bb1c786ac44cc8e92709221d43abf"
  base_url: "https://api.bls.gov/publicAPI/v2/timeseries/data/"

cpi:
  series:
    all_items: "CUSR0000SA0"
    core: "CUSR0000SA0L1E"
    food: "CUSR0000SAF1"
    energy: "CUSR0000SA0E"
    shelter: "CUSR0000SAH1"
    transportation: "CUSR0000SAT"
    medical: "CUSR0000SAM"
    apparel: "CUSR0000SAA"
    recreation: "CUSR0000SAR"
    education_communication: "CUSR0000SAE"
    other: "CUSR0000SAG"
    food_at_home: "CUSR0000SAF11"
    food_away: "CUSR0000SAFV"
    gasoline: "CUSR0000SETB01"
    electricity: "CUSR0000SEHF01"
    rent: "CUSR0000SEHA02"
    owners_equivalent_rent: "CUSR0000SEHC01"
  labels:
    all_items: "CPI 总指数"
    core: "核心 CPI（除食品能源）"
    food: "食品"
    energy: "能源"
    shelter: "住房"
    transportation: "交通"
    medical: "医疗"
    apparel: "服装"
    recreation: "娱乐"
    education_communication: "教育与通信"
    other: "其他商品与服务"
    food_at_home: "家庭食品"
    food_away: "在外餐饮"
    gasoline: "汽油"
    electricity: "电力"
    rent: "租金"
    owners_equivalent_rent: "业主等价租金"
  start_year: 2016

fred:
  api_key: "b4eef119095d53196fccfc9c2a1598b1"
  base_url: "https://api.stlouisfed.org/fred/series/observations"
  start_year: 2016
  series:
    gdp: "GDPC1"
    ppi: "PPIACO"
    unemployment: "UNRATE"
    unemployed_count: "UNEMPLOY"
    labor_force: "CLF16OV"
    nonfarm_payrolls: "PAYEMS"
    initial_claims: "ICSA"
    labor_participation: "CIVPART"
    pce: "PCEPI"
    core_pce: "PCEPILFE"
    fed_funds_rate: "FEDFUNDS"
    treasury_10y: "DGS10"
    treasury_2y: "DGS2"
    yield_spread: "T10Y2Y"
    consumer_sentiment: "UMCSENT"
    retail_sales: "RSAFS"
    industrial_production: "INDPRO"
    housing_starts: "HOUST"
  labels:
    gdp: "实际 GDP"
    ppi: "PPI 生产者价格指数"
    unemployment: "失业率（精确）"
    unemployed_count: "失业人数"
    labor_force: "劳动力人数"
    nonfarm_payrolls: "非农就业人数"
    initial_claims: "初请失业金人数"
    labor_participation: "劳动参与率"
    pce: "PCE 价格指数"
    core_pce: "核心 PCE 价格指数"
    fed_funds_rate: "联邦基金利率"
    treasury_10y: "10年期国债收益率"
    treasury_2y: "2年期国债收益率"
    yield_spread: "10Y-2Y 利差"
    consumer_sentiment: "密歇根消费者信心指数"
    retail_sales: "零售销售额"
    industrial_production: "工业生产指数"
    housing_starts: "新屋开工"
  # 日频数据需要转月均
  daily_series:
    - treasury_10y
    - treasury_2y
    - yield_spread
  # 周频数据转月均
  weekly_series:
    - initial_claims
  # 季度数据
  quarterly_series:
    - gdp
  # 比率类指标（值本身就是%或指数，同比用差值而非变化率）
  rate_series:
    - unemployment
    - fed_funds_rate
    - treasury_10y
    - treasury_2y
    - yield_spread
    - labor_participation
    - consumer_sentiment

china:
  start_year: 2016
  indicators:
    gdp:
      func: "macro_china_gdp"
      label: "GDP"
      frequency: "quarterly"
    cpi:
      func: "macro_china_cpi"
      label: "CPI"
      frequency: "monthly"
    ppi:
      func: "macro_china_ppi"
      label: "PPI"
      frequency: "monthly"
    pmi:
      func: "macro_china_pmi"
      label: "PMI"
      frequency: "monthly"
    money_supply:
      func: "macro_china_money_supply"
      label: "货币供应"
      frequency: "monthly"
    trade:
      func: "macro_china_hgjck"
      label: "进出口贸易"
      frequency: "monthly"
    industrial:
      func: "macro_china_gyzjz"
      label: "工业增加值"
      frequency: "monthly"
    retail:
      func: "macro_china_consumer_goods_retail"
      label: "社会消费品零售"
      frequency: "monthly"
    credit:
      func: "macro_china_new_financial_credit"
      label: "新增人民币贷款"
      frequency: "monthly"
