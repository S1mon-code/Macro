    food_away: "在外餐饮"
    gasoline: "汽油"
    electricity: "电力"
    rent: "租金"
    owners_equivalent_rent: "业主等价租金"
  start_year: 2016

fred:
  api_key: ""  # Set FRED_API_KEY environment variable
  base_url: "https://api.stlouisfed.org/fred/series/observations"
  start_year: 2016
  series:
    gdp: "GDPC1"
    ppi: "PPIACO"
    unemployment: "UNRATE"
    unemployed_count: "UNEMPLOY"
    labor_force: "CLF16OV"
    civilian_population: "CNP16OV"
    nonfarm_payrolls: "PAYEMS"
    initial_claims: "ICSA"
    labor_participation: "CIVPART"
    pce: "PCEPI"
    core_pce: "PCEPILFE"
    fed_funds_rate: "FEDFUNDS"
    treasury_10y: "DGS10"
    treasury_2y: "DGS2"
    yield_spread: "T10Y2Y"
    consumer_sentiment: "UMCSENT"
    retail_sales: "RSAFS"
    industrial_production: "INDPRO"
    housing_starts: "HOUST"
    ppi_final_demand: "PPIFIS"
    core_ppi: "PPIFES"
    avg_hourly_earnings: "CES0500000003"
    trade_balance: "BOPGSTB"
    m2_money_supply: "M2SL"
    capacity_utilization: "TCU"
    # 通胀拆解
    cpi_all_urban: "CPIAUCSL"
    core_cpi_fred: "CPILFESL"
    sticky_cpi: "CORESTICKM159SFRBATL"
    flexible_cpi: "FLEXCPIM159SFRBATL"
    trimmed_mean_pce: "PCETRIM12M159SFRBDAL"
    median_cpi: "MEDCPIM158SFRBCLE"
    # 就业深度
    jolts_openings: "JTSJOL"
    jolts_quits: "JTSQUR"
    u6_rate: "U6RATE"
    prime_age_lfpr: "LNS11300060"
    # 金融条件 & 信用
    hy_spread: "BAMLH0A0HYM2"
    ig_spread: "BAMLC0A0CM"
    treasury_3m: "DGS3MO"
    # 油价/汽油（CPI预测用）
    wti_crude: "DCOILWTICO"
    retail_gasoline: "GASREGW"
    dxy: "DTWEXBGS"
    # 领先指标
    lei: "USSLIND"
  labels:
    gdp: "实际 GDP"
    ppi: "PPI 生产者价格指数"
    unemployment: "失业率（精确）"
    unemployed_count: "失业人数"
    labor_force: "劳动力人数"
    civilian_population: "适龄人口"
    nonfarm_payrolls: "非农就业人数"
    initial_claims: "初请失业金人数"
    labor_participation: "劳动参与率"
    pce: "PCE 价格指数"
    core_pce: "核心 PCE 价格指数"
    fed_funds_rate: "联邦基金利率"
    treasury_10y: "10年期国债收益率"
    treasury_2y: "2年期国债收益率"
    yield_spread: "10Y-2Y 利差"
    consumer_sentiment: "密歇根消费者信心指数"
    retail_sales: "零售销售额"
    industrial_production: "工业生产指数"
    housing_starts: "新屋开工"
    ppi_final_demand: "PPI 最终需求"
    core_ppi: "核心 PPI"
    avg_hourly_earnings: "平均时薪"
    trade_balance: "贸易差额"
    m2_money_supply: "M2 货币供应量"
    capacity_utilization: "产能利用率"
    cpi_all_urban: "CPI-U 指数"
    core_cpi_fred: "核心 CPI 指数"
    sticky_cpi: "粘性 CPI"
    flexible_cpi: "弹性 CPI"
    trimmed_mean_pce: "截尾均值 PCE"
    median_cpi: "中位 CPI"
    jolts_openings: "JOLTS 职位空缺"
    jolts_quits: "辞职率"
    u6_rate: "U-6 广义失业率"
    prime_age_lfpr: "25-54岁劳动参与率"
    hy_spread: "高收益信用利差"
    ig_spread: "投资级信用利差"
    treasury_3m: "3月期国债收益率"
    wti_crude: "WTI 原油价格"
    retail_gasoline: "零售汽油价格"
    dxy: "美元指数 (DXY)"
    lei: "会议局 LEI"
  # 日频数据需要转月均
  daily_series:
    - treasury_10y
    - treasury_2y
    - yield_spread
    - treasury_3m
    - hy_spread
    - ig_spread
    - wti_crude
    - dxy
  # 周频数据转月均
  weekly_series:
    - initial_claims
    - retail_gasoline
  # 季度数据
  quarterly_series:
    - gdp
  # 比率类指标（值本身就是%或指数，同比用差值而非变化率）
  rate_series:
    - unemployment
    - fed_funds_rate
    - treasury_10y
    - treasury_2y
    - yield_spread
    - labor_participation
    - consumer_sentiment
    - capacity_utilization
    - sticky_cpi
    - flexible_cpi
    - trimmed_mean_pce
    - median_cpi
    - jolts_quits
    - u6_rate
    - prime_age_lfpr
    - hy_spread
    - ig_spread
    - treasury_3m

china:
  start_year: 2016
  indicators:
    gdp:
      func: "macro_china_gdp"
      label: "GDP"
      frequency: "quarterly"
    cpi:
      func: "macro_china_cpi"
      label: "CPI"
      frequency: "monthly"
    ppi:
      func: "macro_china_ppi"
      label: "PPI"
      frequency: "monthly"
    pmi:
      func: "macro_china_pmi"
      label: "PMI"
      frequency: "monthly"
    money_supply:
      func: "macro_china_money_supply"
      label: "货币供应"
      frequency: "monthly"
    trade:
      func: "macro_china_hgjck"
      label: "进出口贸易"
      frequency: "monthly"
    industrial:
      func: "macro_china_gyzjz"
      label: "工业增加值"
      frequency: "monthly"
    retail:
      func: "macro_china_consumer_goods_retail"
      label: "社会消费品零售"
      frequency: "monthly"
    credit:
      func: "macro_china_new_financial_credit"
      label: "新增人民币贷款"
      frequency: "monthly"
    fx_reserves:
      func: "macro_china_fx_gold"
      label: "外汇储备"
      frequency: "monthly"
    lpr:
      func: "macro_china_lpr"
      label: "LPR 利率"
      frequency: "monthly"
    shibor:
      func: "macro_china_shibor_all"
      label: "Shibor 利率"
      frequency: "daily"
